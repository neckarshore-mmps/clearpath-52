name: ci

# ClearPath v0.2a — unit test gate (S1+).
# Kept separate from security.yml (test concern ≠ scan concern).
# Triggered on the same surfaces as security.yml for consistency.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: vitest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm test
